<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三体运动模拟沙盒</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="simCanvas"></canvas>
    
    <div id="ui-panel">
        <div class="panel-header">
            <div>
                <h1>三体物理沙盒</h1>
                <p>无限缩放视野，AU (天文单位) 级坐标轴</p>
            </div>
            <button id="btn-collapse" title="折叠/展开面板">➖</button>
        </div>

        <div id="panel-content">
            <div class="controls-main">
                <button id="btn-toggle" class="btn-play">开始模拟</button>
                <button id="btn-reset" class="btn-reset">恢复初始</button>
            </div>

            <div class="body-settings" id="settings-global">
                <h3 style="color: #ffffff;">⚙️ 全局设置</h3>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-axes" checked>
                    <label for="show-axes">显示天文单位 (AU) 坐标轴</label>
                </div>
                
                <div class="input-group mt-10">
                    <label>轨迹显示</label>
                    <select id="path-mode">
                        <option value="tail">渐隐尾迹</option>
                        <option value="all">显示全部 (不消失)</option>
                        <option value="none">不显示轨迹</option>
                    </select>
                </div>

                <div class="slider-group mt-10">
                    <label>模拟速度: <span id="speed-val">1.0</span>x</label>
                    <!-- 速度上限扩大到 10倍 -->
                    <input type="range" id="sim-speed" min="0.1" max="10.0" step="0.1" value="1.0">
                </div>
            </div>

            <!-- 星体独立设置：初始滑块最大值调整为 100 -->
            <div class="body-settings">
                <h3 style="color: #ff4d4d;">红星</h3>
                <div class="input-group">
                    <label>质量 (M<sub>⊙</sub>)</label>
                    <input type="range" id="m-slide-0" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="m-num-0" step="0.1" value="1.0">
                </div>
                <div class="input-group">
                    <label>半径 (R<sub>⊙</sub>)</label>
                    <input type="range" id="r-slide-0" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="r-num-0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="body-settings">
                <h3 style="color: #4da6ff;">蓝星</h3>
                <div class="input-group">
                    <label>质量 (M<sub>⊙</sub>)</label>
                    <input type="range" id="m-slide-1" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="m-num-1" step="0.1" value="1.0">
                </div>
                <div class="input-group">
                    <label>半径 (R<sub>⊙</sub>)</label>
                    <input type="range" id="r-slide-1" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="r-num-1" step="0.1" value="1.0">
                </div>
            </div>

            <div class="body-settings">
                <h3 style="color: #ffcc00;">黄星</h3>
                <div class="input-group">
                    <label>质量 (M<sub>⊙</sub>)</label>
                    <input type="range" id="m-slide-2" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="m-num-2" step="0.1" value="1.0">
                </div>
                <div class="input-group">
                    <label>半径 (R<sub>⊙</sub>)</label>
                    <input type="range" id="r-slide-2" min="0.1" max="100.0" step="0.1" value="1.0">
                    <input type="number" id="r-num-2" step="0.1" value="1.0">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
