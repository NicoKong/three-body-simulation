
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三体运动模拟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="simCanvas"></canvas>
    
    <div id="ui-panel">
        <h1>三体运动模拟</h1>
        <p>拖动星体改变位置，<b>滑动滚轮缩放视角</b></p>
        
        <div class="controls-main">
            <button id="btn-toggle" class="btn-play">开始模拟</button>
            <button id="btn-reset" class="btn-reset">恢复初始</button>
        </div>

        <!-- 新增：全局设置面板 -->
        <div class="body-settings" id="settings-global">
            <h3 style="color: #ffffff;">⚙️ 全局设置</h3>
            <div class="slider-group">
                <label>模拟速度: <span id="speed-val">1.0</span>x</label>
                <input type="range" id="sim-speed" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="slider-group">
                <label>缩放视角: <span id="zoom-val">1.0</span>x</label>
                <input type="range" id="sim-zoom" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
        </div>

        <div class="body-settings" id="settings-0">
            <h3 style="color: #ff4d4d;">红星</h3>
            <div class="slider-group">
                <label>质量: <span id="m-val-0">100</span></label>
                <input type="range" id="m-0" min="10" max="500" value="100">
            </div>
            <div class="slider-group">
                <label>大小: <span id="r-val-0">8</span></label>
                <input type="range" id="r-0" min="2" max="30" value="8">
            </div>
        </div>

        <div class="body-settings" id="settings-1">
            <h3 style="color: #4da6ff;">蓝星</h3>
            <div class="slider-group">
                <label>质量: <span id="m-val-1">100</span></label>
                <input type="range" id="m-1" min="10" max="500" value="100">
            </div>
            <div class="slider-group">
                <label>大小: <span id="r-val-1">8</span></label>
                <input type="range" id="r-1" min="2" max="30" value="8">
            </div>
        </div>

        <div class="body-settings" id="settings-2">
            <h3 style="color: #ffcc00;">黄星</h3>
            <div class="slider-group">
                <label>质量: <span id="m-val-2">100</span></label>
                <input type="range" id="m-2" min="10" max="500" value="100">
            </div>
            <div class="slider-group">
                <label>大小: <span id="r-val-2">8</span></label>
                <input type="range" id="r-2" min="2" max="30" value="8">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
